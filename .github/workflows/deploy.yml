name: Deploy til cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cPanel Git Deploy
        run: |
          curl -s -X POST \
            "https://holycow.media:2083/execute/VersionControl/update" \
            -H "Authorization: cpanel holycow:${{ secrets.CPANEL_API_TOKEN }}" \
            --data-urlencode "repository=/home/holycow/repositories/workshop" \
            -w "\nHTTP status: %{http_code}\n"
