name: Deploy til cPanel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Upload filer til cPanel
        env:
          TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set +e
          upload() {
            local file=$1
            local dir=${2:-/public_html/workshop}
            local fname=$(basename "$file")
            echo "─── $file → $dir/$fname"
            RESPONSE=$(curl -sS --max-time 60 -w "\n__HTTP__:%{http_code}" \
              -X POST "https://holycow.media:2083/execute/Fileman/upload_files" \
              -H "Authorization: cpanel holycow:$TOKEN" \
              -F "dir=$dir" \
              -F "overwrite=1" \
              -F "file-1=@$file" 2>&1)
            HTTP=$(echo "$RESPONSE" | grep -oE '__HTTP__:[0-9]+' | tail -1 | cut -d: -f2)
            BODY=$(echo "$RESPONSE" | sed 's/__HTTP__:[0-9]*$//')
            echo "  HTTP: ${HTTP:-?}"
            if [ -z "$BODY" ]; then
              echo "  TOM RESPONS — fejl"
              return 1
            fi
            STATUS=$(echo "$BODY" | python3 -c "
          import sys, json
          try:
            d = json.loads(sys.stdin.read())
            if d.get('status') == 1:
              print('OK')
            else:
              print('FEJL:', d.get('errors') or d.get('messages'))
              sys.exit(1)
          except Exception as e:
            print('PARSE-FEJL:', e)
            sys.exit(1)
          " 2>&1)
            echo "  $STATUS"
            echo "$STATUS" | grep -q "^OK" || return 1
          }

          FAILED=0
          upload index.html      || FAILED=$((FAILED+1))
          upload app.js          || FAILED=$((FAILED+1))
          upload styles.css      || FAILED=$((FAILED+1))
          upload config.js       || FAILED=$((FAILED+1))
          upload assets/logo.svg /public_html/workshop/assets || FAILED=$((FAILED+1))

          if [ "$FAILED" -gt 0 ]; then
            echo ""
            echo "❌ $FAILED fil(er) fejlede"
            exit 1
          fi
          echo ""
          echo "✓ Alle filer uploadet"
